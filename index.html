<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
<title>数控综合技能测试</title>
<style>
*{box-sizing:border-box;font-family:"Microsoft YaHei",sans-serif;}
body{background:#f5f7fa;padding:20px;margin:0;}
.container{max-width:950px;margin:0 auto;background:white;padding:30px;border-radius:12px;box-shadow:0 2px 12px rgba(0,0,0,0.1);}
h1{text-align:center;color:#2d3748;margin-bottom:20px;font-size:22px;}
.mode-bar{display:flex;gap:10px;margin-bottom:20px;justify-content:center;flex-wrap:wrap;}
.mode-btn{padding:10px 20px;border:none;border-radius:6px;background:#e2e8f0;cursor:pointer;font-size:15px;}
.mode-btn.active{background:#4299e1;color:white;}
.progress-bar{height:8px;background:#e2e8f0;border-radius:4px;margin-bottom:15px;overflow:hidden;}
.progress-inner{height:100%;background:#4299e1;width:0%;transition:0.3s;}
.question{margin:16px 0;padding:14px;border-left:4px solid #4299e1;background:#f7fafc;border-radius:6px;}
.q-title{font-weight:bold;margin-bottom:8px;color:#2d3748;}
.option{margin:5px 0;cursor:pointer;padding:4px 8px;border-radius:4px;}
.option:hover{background:#e8f4ff;}
.analysis{font-size:14px;margin-top:8px;color:#4a5568;display:none;}
.correct{background:#c6f6d5 !important;color:#22543d;}
.wrong{background:#fed7d7 !important;color:#742a2a;}
#result{margin-top:20px;padding:15px;border-radius:6px;font-size:18px;text-align:center;font-weight:bold;}
.btns{display:flex;justify-content:center;gap:10px;margin-top:40px;padding-top:20px;border-top:1px solid #eee;flex-wrap:wrap;}
.btns button{padding:10px 16px;border:none;border-radius:6px;font-size:15px;cursor:pointer;color:#333;}
#submit{background:#cce5ff;}
#reset{background:#e2e8f0;}
#redo{background:#d9f9d9;}
#change{background:#ffeaa7;}
#prev{background:#e2e8f0;}
#next{background:#cce5ff;}
#allList{background:#ffeaa7;}
#backTop{position:fixed;right:20px;bottom:20px;width:46px;height:46px;border:none;border-radius:50%;background:#666;color:#fff;font-size:20px;cursor:pointer;display:none;align-items:center;justify-content:center;}
.list-modal{position:fixed;top:0;left:0;width:100%;height:100%;background:rgba(0,0,0,0.5);display:none;align-items:center;justify-content:center;z-index:999;}
.list-box{background:white;padding:20px;border-radius:8px;max-height:80vh;overflow-y:auto;width:80%;max-width:600px;}
.list-title{font-weight:bold;margin-bottom:10px;text-align:center;}
.question-grid{display:grid;grid-template-columns:repeat(10,1fr);gap:8px;}
.question-grid button{padding:8px;border:none;border-radius:4px;background:#e2e8f0;cursor:pointer;}
@media (max-width:767px){
  .container{padding:15px;}
  h1{font-size:18px;}
  .mode-btn{padding:8px 14px;font-size:14px;}
  .btns button{padding:8px 12px;font-size:14px;}
  .question{padding:10px;}
  .question-grid{grid-template-columns:repeat(5,1fr);}
}
</style>
</head>
<body>
<div class="container">
    <h1>数控综合技能测试（200题完整版）</h1>
    <div class="mode-bar">
        <button class="mode-btn active" data-mode="practice">练习模式</button>
        <button class="mode-btn" data-mode="exam">考试模式</button>
    </div>
    <div class="progress-bar" id="progressWrap">
        <div class="progress-inner" id="progressBar"></div>
    </div>
    <div id="questions"></div>
    <div id="result"></div>
    <div class="btns" id="examBtns" style="display:none;">
        <button id="submit">提交答案</button>
        <button id="reset">清空答案</button>
        <button id="redo">重做错题</button>
        <button id="change">更换题目</button>
    </div>
    <div class="btns" id="practiceBtns">
        <button id="prev">上一题</button>
        <button id="next">下一题</button>
        <button id="allList">所有题目</button>
    </div>
</div>
<button id="backTop">↑</button>
<div class="list-modal" id="listModal">
    <div class="list-box">
        <div class="list-title">全部题目列表（共200题）</div>
        <div class="question-grid" id="questionGrid"></div>
    </div>
</div>

const pageSizeExam = 25;
let mode = "practice";
let currentExamList = [];
let wrongList = [];
let currentPracticeIndex = 0;
const box = document.getElementById('questions');
const progressWrap = document.getElementById('progressWrap');
const progressBar = document.getElementById('progressBar');
const examBtns = document.getElementById('examBtns');
const practiceBtns = document.getElementById('practiceBtns');
const listModal = document.getElementById('listModal');
const questionGrid = document.getElementById('questionGrid');
const backTopBtn = document.getElementById('backTop');
document.querySelectorAll('.mode-btn').forEach(btn=>{
    btn.onclick = ()=>{
        document.querySelectorAll('.mode-btn').forEach(b=>b.classList.remove('active'));
        btn.classList.add('active');
        mode = btn.dataset.mode;
        wrongList = [];
        if(mode==="practice"){
            examBtns.style.display = "none";
            practiceBtns.style.display = "flex";
            progressWrap.style.display = "block";
            currentPracticeIndex = 0;
            renderPractice();
        }else{
            examBtns.style.display = "flex";
            practiceBtns.style.display = "none";
            progressWrap.style.display = "none";
            getNewExamBatch();
            renderExam();
        }
        document.getElementById('result').innerText = "";
    }
});
function shuffle(arr){
    let a=[...arr];
    for(let i=a.length-1;i>0;i--){
        let j=Math.floor(Math.random()*(i+1));
        [a[i],a[j]]=[a[j],a[i]];
    }
    return a;
}
function getNewExamBatch(){
    currentExamList = shuffle(fullBank).slice(0,pageSizeExam);
}
function renderExam(){
    box.innerHTML="";
    wrongList=[];
    currentExamList.forEach((item,i)=>{
        let div=document.createElement('div');
        div.className='question';
        div.innerHTML=`<div class="q-title">${i+1}. ${item.q}</div>`;
        item.opt.forEach(o=>{
            div.innerHTML+=`<div class="option"><input type="radio" name="q${i}" value="${o.charAt(0)}"> ${o}</div>`;
        });
        div.innerHTML+=`<div class="analysis">解析：${item.tip}</div>`;
        box.appendChild(div);
    });
    document.getElementById('result').innerText="";
}
function renderPractice(){
    box.innerHTML="";
    let item = fullBank[currentPracticeIndex];
    let div=document.createElement('div');
    div.className='question';
    div.innerHTML=`<div class="q-title">第${currentPracticeIndex+1}题：${item.q}</div>`;
    item.opt.forEach(o=>{
        div.innerHTML+=`<div class="option"><input type="radio" name="p" value="${o.charAt(0)}"> ${o}</div>`;
    });
    div.innerHTML+=`<div class="analysis">解析：${item.tip}</div>`;
    box.appendChild(div);
    let percent = ((currentPracticeIndex+1)/fullBank.length*100).toFixed(1);
    progressBar.style.width = percent+"%";
}
function initQuestionList(){
    questionGrid.innerHTML="";
    for(let i=0;i<200;i++){
        let btn=document.createElement('button');
        btn.innerText=i+1;
        btn.onclick=()=>{
            currentPracticeIndex=i;
            renderPractice();
            listModal.style.display="none";
        };
        questionGrid.appendChild(btn);
    }
}
document.getElementById('submit').onclick=()=>{
    let right=0;
    wrongList=[];
    document.querySelectorAll('.question').forEach((dom,i)=>{
        let sel=dom.querySelector('input:checked');
        let ans=currentExamList[i].ans;
        let tip=dom.querySelector('.analysis');
        dom.classList.remove('correct','wrong');
        tip.style.display='block';
        if(sel&&sel.value===ans){
            right++;
            dom.classList.add('correct');
        }else{
            dom.classList.add('wrong');
            wrongList.push(currentExamList[i]);
        }
    });
    let score = (right/pageSizeExam*100).toFixed(1);
    document.getElementById('result').innerText=`得分：${score} 分（答对${right}/${pageSizeExam}题，错题${wrongList.length}题）`;
};
document.getElementById('reset').onclick=()=>{
    document.querySelectorAll('input[type=radio]').forEach(r=>r.checked=false);
    document.querySelectorAll('.question').forEach(d=>{
        d.classList.remove('correct','wrong');
        d.querySelector('.analysis').style.display='none';
    });
    document.getElementById('result').innerText="";
};
document.getElementById('redo').onclick=()=>{
    if(wrongList.length===0){alert("暂无错题，请先提交试卷");return;}
    currentExamList = [...wrongList];
    renderExam();
    document.getElementById('result').innerText=`当前错题重做模式，共${currentExamList.length}题`;
};
document.getElementById('change').onclick=()=>{
    getNewExamBatch();
    renderExam();
};
document.getElementById('prev').onclick=()=>{
    if(currentPracticeIndex>0){
        currentPracticeIndex--;
        renderPractice();
    }
};
document.getElementById('next').onclick=()=>{
    if(currentPracticeIndex<199){
        currentPracticeIndex++;
        renderPractice();
    }
};
document.getElementById('allList').onclick=()=>{
    listModal.style.display="flex";
};
listModal.onclick=(e)=>{
    if(e.target===listModal) listModal.style.display="none";
};
window.addEventListener('scroll',()=>{
    backTopBtn.style.display = window.scrollY>300 ? 'flex' : 'none';
});
backTopBtn.onclick=()=>{
    window.scrollTo({top:0,behavior:'smooth'});
};
initQuestionList();
currentPracticeIndex=0;
renderPractice();
</script>
</body>
</html>
